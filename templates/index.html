<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VecP Safety Benchmark Suite</title>
  <style>
    /* === DARK TERMINAL THEME === */
    :root {
      --bg:        #0a0a0a;
      --panel:     #111111;
      --border:    #1e1e1e;
      --green:     #00ff41;
      --green-dim: #00aa2a;
      --text:      #c8c8c8;
      --text-dim:  #555555;
      --red:       #ff4141;
      --yellow:    #ffd700;
      --font:      'Courier New', Courier, monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      min-height: 100vh;
      padding: 2rem;
    }

    /* Header */
    header {
      border-bottom: 1px solid var(--green);
      padding-bottom: 0.75rem;
      margin-bottom: 2rem;
      display: flex;
      align-items: baseline;
      gap: 1.5rem;
    }
    header h1 {
      color: var(--green);
      font-size: 1rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    header p {
      color: var(--text-dim);
      font-size: 0.7rem;
    }

    /* Panel */
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 1rem;
    }
    .panel h2 {
      color: var(--green);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--border);
    }

    /* Config layout */
    .config-row {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .config-row-bottom {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    /* Form controls */
    input[type="text"],
    select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 0.8rem;
      padding: 0.4rem 0.6rem;
      width: 100%;
    }
    input[type="text"]:focus,
    select:focus {
      outline: none;
      border-color: var(--green-dim);
    }
    select option { background: var(--bg); }

    /* Adapter checkboxes */
    .adapter-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem 1rem;
    }
    .adapter-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      user-select: none;
    }
    .adapter-label input[type="checkbox"] {
      accent-color: var(--green);
      cursor: pointer;
      width: 13px;
      height: 13px;
    }
    .adapter-label span {
      font-size: 0.75rem;
      color: var(--text);
      letter-spacing: 0.05em;
    }
    .adapter-label:hover span { color: var(--green); }

    /* Run button */
    #run-btn {
      width: 100%;
      background: transparent;
      border: 1px solid var(--green);
      color: var(--green);
      font-family: var(--font);
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.65rem 1.5rem;
      cursor: pointer;
      margin-bottom: 1.25rem;
      transition: background 0.15s;
    }
    #run-btn:hover:not(:disabled) { background: rgba(0, 255, 65, 0.08); }
    #run-btn:disabled {
      color: var(--text-dim);
      border-color: var(--text-dim);
      cursor: not-allowed;
    }

    /* Error banner */
    #error-banner {
      display: none;
      background: rgba(255, 65, 65, 0.08);
      border: 1px solid var(--red);
      color: var(--red);
      font-size: 0.75rem;
      padding: 0.5rem 0.75rem;
      margin-bottom: 1rem;
    }

    /* Progress */
    #progress-area {
      display: none;
      margin-bottom: 1.25rem;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      background: var(--panel);
    }
    #progress-label {
      font-size: 0.72rem;
      color: var(--green);
      margin-bottom: 0.45rem;
      letter-spacing: 0.04em;
    }
    .progress-track {
      background: var(--border);
      height: 3px;
      width: 100%;
    }
    .progress-fill {
      background: var(--green);
      height: 100%;
      width: 0%;
      transition: width 0.12s linear;
    }

    /* Results */
    #results-area { display: none; }
    #results-area h2 {
      color: var(--green);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--green-dim);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.75rem;
    }
    thead tr { border-bottom: 1px solid var(--green-dim); }
    th {
      color: var(--green);
      text-align: left;
      padding: 0.3rem 0.75rem;
      font-weight: normal;
      letter-spacing: 0.08em;
      font-size: 0.65rem;
      white-space: nowrap;
    }
    td {
      padding: 0.35rem 0.75rem;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    tbody tr:hover td { background: rgba(255, 255, 255, 0.02); }

    /* Metric coloring */
    .g { color: var(--green); }
    .w { color: var(--yellow); }
    .b { color: var(--red); }
    .d { color: var(--text-dim); font-style: italic; }
  </style>
</head>
<body>

<header>
  <h1>[ VecP Safety Benchmark Suite ]</h1>
  <p>model-agnostic evaluation harness // multi-method comparison</p>
</header>

<div id="error-banner"></div>

<!-- Config row 1: target model + methods -->
<div class="config-row">
  <div class="panel">
    <h2>Target Model</h2>
    <input type="text" id="target-model" placeholder="e.g. claude-sonnet-4-6" value="claude-sonnet-4-6">
  </div>
  <div class="panel">
    <h2>Methods to Compare</h2>
    <div class="adapter-grid" id="adapter-grid">
      <!-- Populated by JS from server-injected data -->
    </div>
  </div>
</div>

<!-- Config row 2: volume + dataset -->
<div class="config-row-bottom">
  <div class="panel">
    <h2>Prompt Volume</h2>
    <select id="volume-select"></select>
  </div>
  <div class="panel">
    <h2>Dataset Source</h2>
    <select id="gauntlet-select"></select>
  </div>
</div>

<button id="run-btn">&#9658;&nbsp; Run Multi-Method Benchmark</button>

<!-- Progress -->
<div id="progress-area">
  <div id="progress-label">&gt; Initializing...</div>
  <div class="progress-track">
    <div class="progress-fill" id="progress-fill"></div>
  </div>
</div>

<!-- Results table -->
<div id="results-area">
  <h2>Results</h2>
  <table>
    <thead>
      <tr>
        <th>METHOD</th>
        <th>TIME</th>
        <th>RECALL</th>
        <th>PRECISION</th>
        <th>F1</th>
        <th>FP RATE</th>
        <th>ACCURACY</th>
        <th>EFF. RECALL</th>
        <th>TP/TN/FP/FN</th>
        <th>STATUS</th>
      </tr>
    </thead>
    <tbody id="results-tbody"></tbody>
  </table>
</div>

<script>
// ─── Config injected from Flask ───────────────────────────────────────────────
const ADAPTERS      = {{ adapters | tojson }};
const GAUNTLETS     = {{ gauntlets | tojson }};
const VOLUME_OPTIONS = {{ volume_options | tojson }};

// ─── Populate controls ────────────────────────────────────────────────────────
(function buildControls() {
  const grid = document.getElementById("adapter-grid");
  ADAPTERS.forEach((name, i) => {
    const label = document.createElement("label");
    label.className = "adapter-label";
    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.name = "adapter";
    cb.value = name;
    // Pre-check the first two
    if (i < 2) cb.checked = true;
    const span = document.createElement("span");
    span.textContent = name;
    label.appendChild(cb);
    label.appendChild(span);
    grid.appendChild(label);
  });

  const volSel = document.getElementById("volume-select");
  VOLUME_OPTIONS.forEach(v => {
    const opt = document.createElement("option");
    opt.value = v;
    opt.textContent = v;
    if (v === "QUICK-20") opt.selected = true;
    volSel.appendChild(opt);
  });

  const gSel = document.getElementById("gauntlet-select");
  GAUNTLETS.forEach(g => {
    const opt = document.createElement("option");
    opt.value = g;
    opt.textContent = g;
    gSel.appendChild(opt);
  });
})();

// ─── Metric coloring helpers ──────────────────────────────────────────────────
function pct(val) { return (val * 100).toFixed(1) + "%"; }

function colorHigh(val) {
  // Higher is better (recall, precision, F1, accuracy, eff_recall)
  const cls = val >= 0.85 ? "g" : val >= 0.60 ? "w" : "b";
  return `<span class="${cls}">${pct(val)}</span>`;
}

function colorLow(val) {
  // Lower is better (FP rate)
  const cls = val <= 0.05 ? "g" : val <= 0.15 ? "w" : "b";
  return `<span class="${cls}">${pct(val)}</span>`;
}

function colorF1(val) {
  const cls = val >= 0.80 ? "g" : val >= 0.50 ? "w" : "b";
  return `<span class="${cls}">${val.toFixed(3)}</span>`;
}

// ─── UI helpers ───────────────────────────────────────────────────────────────
function showError(msg) {
  const b = document.getElementById("error-banner");
  b.textContent = "\u25b6 ERROR: " + msg;
  b.style.display = "block";
}

function clearError() {
  document.getElementById("error-banner").style.display = "none";
}

function setProgress(label, pctVal) {
  document.getElementById("progress-label").textContent = "\u003e " + label;
  document.getElementById("progress-fill").style.width = pctVal.toFixed(1) + "%";
}

// ─── Pre-seed table with "waiting..." rows ───────────────────────────────────
function preSeedRows(adapters) {
  const tbody = document.getElementById("results-tbody");
  tbody.innerHTML = "";
  adapters.forEach(name => {
    const tr = document.createElement("tr");
    tr.id = "row-" + name;
    tr.innerHTML =
      `<td class="g">${name}</td>` +
      `<td colspan="9" class="d">waiting\u2026</td>`;
    tbody.appendChild(tr);
  });
}

function fillRow(method, m) {
  const tr = document.getElementById("row-" + method);
  if (!tr) return;
  tr.innerHTML =
    `<td class="g">${method}</td>` +
    `<td>${m.time_sec}s</td>` +
    `<td>${colorHigh(m.recall)}</td>` +
    `<td>${colorHigh(m.precision)}</td>` +
    `<td>${colorF1(m.f1)}</td>` +
    `<td>${colorLow(m.fp_rate)}</td>` +
    `<td>${colorHigh(m.accuracy)}</td>` +
    `<td>${colorHigh(m.eff_recall)}</td>` +
    `<td style="color:var(--text-dim)">` +
      `${m.tp}/${m.tn}/${m.fp}/${m.fn}` +
    `</td>` +
    `<td class="g">DONE</td>`;
}

function markRowError(method, message) {
  const tr = document.getElementById("row-" + method);
  if (!tr) return;
  tr.innerHTML =
    `<td class="g">${method}</td>` +
    `<td colspan="9" class="b">ERROR: ${message}</td>`;
}

// ─── Main run handler ─────────────────────────────────────────────────────────
let currentSource = null;

document.getElementById("run-btn").addEventListener("click", async () => {
  clearError();

  const selected = Array.from(
    document.querySelectorAll('input[name="adapter"]:checked')
  ).map(cb => cb.value);

  if (selected.length === 0) {
    showError("Select at least one method to compare.");
    return;
  }

  const gauntlet    = document.getElementById("gauntlet-select").value;
  const volume      = document.getElementById("volume-select").value;
  const targetModel = document.getElementById("target-model").value.trim() || "unspecified";

  // Close any previous stream
  if (currentSource) { currentSource.close(); currentSource = null; }

  const runBtn = document.getElementById("run-btn");
  runBtn.disabled = true;
  document.getElementById("progress-area").style.display = "block";
  document.getElementById("results-area").style.display = "block";
  preSeedRows(selected);
  setProgress("Starting benchmark\u2026", 0);

  // POST /run ──────────────────────────────────────────────────────────────────
  let runId;
  try {
    const resp = await fetch("/run", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        adapters:     selected,
        gauntlet:     gauntlet,
        volume:       volume,
        target_model: targetModel,
      }),
    });
    const data = await resp.json();
    if (!resp.ok) {
      showError(data.error || "Server error (" + resp.status + ")");
      runBtn.disabled = false;
      return;
    }
    runId = data.run_id;
  } catch (err) {
    showError("Could not reach server: " + err.message);
    runBtn.disabled = false;
    return;
  }

  // SSE stream ─────────────────────────────────────────────────────────────────
  const es = new EventSource("/stream/" + runId);
  currentSource = es;

  es.onmessage = (e) => {
    let event;
    try { event = JSON.parse(e.data); } catch { return; }

    if (event.type === "progress") {
      const overall = ((event.adapter_index - 1 + event.pct / 100) / event.adapter_total) * 100;
      setProgress(
        "Benchmarking " + event.method +
        " (" + event.adapter_index + "/" + event.adapter_total + ")" +
        " \u2014 " + event.index + "/" + event.total + " prompts (" + event.pct + "%)",
        overall
      );

    } else if (event.type === "result") {
      fillRow(event.method, event.metrics);

    } else if (event.type === "error") {
      if (event.method === "GAUNTLET") {
        showError(event.message);
      } else {
        markRowError(event.method, event.message);
      }

    } else if (event.type === "done") {
      setProgress("Complete.", 100);
      runBtn.disabled = false;
      es.close();
      currentSource = null;
    }
  };

  es.onerror = () => {
    if (es.readyState === EventSource.CLOSED) return; // normal close after done
    showError("SSE stream disconnected. Check server logs.");
    runBtn.disabled = false;
    es.close();
    currentSource = null;
  };
});
</script>
</body>
</html>
